<!DOCTYPE html>
<html>
<head>
    <title>Slide Viewer</title>
    <style>
        body { font-family: sans-serif; background: #333; color: white; margin: 0; padding: 20px; }
        .slide-container { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
        .slide { border: 2px solid #555; background: #000; padding: 10px; width: 45%; }
        img { width: 100%; height: auto; }
        .label { text-align: center; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Slide Viewer</h1>
    <div class="slide-container">
        <!-- slides will be injected here -->
    </div>
    <script>
        const container = document.querySelector('.slide-container');
        for (let i = 1; i <= 24; i++) {
            const slide = document.createElement('div');
            slide.className = 'slide';
            slide.innerHTML = `
                <img src="public/CNK- COMPANY PROFILE/Slide${i}.JPG" alt="Slide ${i}">
                <div class="label">Slide ${i}</div>
            `;
            container.appendChild(slide);
        }
    </script>
</body>
</html>
